{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h2 class="card-title mb-4">Resultado del Prompt: <span class="text-primary">{{ prompt.title }}</span></h2>

    <div class="mb-4">
      <h5 class="text-muted">Entrada usada:</h5>
      <pre class="bg-light p-3 rounded">{{ filled_template }}</pre>
    </div>

    <div>
      <h5 class="text-muted">Respuesta generada:</h5>
      <div class="bg-white p-3 border rounded">
        {{ response }}
      </div>
    </div>

    <form method="post" action="/prompts/{{ prompt.id }}/rate" class="mt-4">
      <label for="rating" class="form-label">Puntúa este prompt:</label>
      <select class="form-select" name="rating" id="rating" required>
        <option value="" disabled selected>Selecciona una puntuación</option>
        {% for i in range(1, 6) %}
        <option value="{{ i }}">{{ i }} ⭐</option>
        {% endfor %}
      </select>
      <button type="submit" class="btn btn-success mt-2">Enviar</button>
    </form>
  </div>
</div>
{% endblock %}
